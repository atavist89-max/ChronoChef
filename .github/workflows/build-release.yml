name: Build Fruit Identifier APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
      
      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
      
      - name: Sign APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/34.0.0/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out fruit-identifier-v${{ github.run_number }}.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
      
      - name: Verify APK size
        run: |
          APK_SIZE=$(stat -c%s "fruit-identifier-v${{ github.run_number }}.apk")
          MAX_SIZE=$((25 * 1024 * 1024))
          if [ $APK_SIZE -gt $MAX_SIZE ]; then
            echo "APK size ($APK_SIZE bytes) exceeds 25MB limit"
            exit 1
          fi
          echo "APK size: $APK_SIZE bytes ($(($APK_SIZE / 1024 / 1024)) MB)"
      
      - name: Scan for emojis
        run: |
          if grep -r -n "$(printf '[\u2600-\u27BF\u1F300-\u1F9FF]')" app/src/ 2>/dev/null; then
            echo "ERROR: Emojis found in source code!"
            exit 1
          fi
          echo "No emojis found - check passed"
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: fruit-identifier-v${{ github.run_number }}.apk
          tag_name: v${{ github.run_number }}
          name: "Fruit Identifier v${{ github.run_number }}"
          body: |
            ## Installation
            1. Download APK (~18MB)
            2. Download Gemma 4 E4B model (2.5GB for 4-bit quantized): 
               `wget https://huggingface.co/google/gemma-4-e2b/resolve/main/gemma-4-e2b-q4_0.tflite`
            3. Install APK: `adb install fruit-identifier-v${{ github.run_number }}.apk`
            4. Push model: `adb push gemma-4-e2b-q4_0.tflite /sdcard/Android/data/com.fruitid/files/`
            5. Launch app (auto-imports from external to private storage)
            
            ## Features
            - Real-time fruit detection using Gemma 4 E4B vision model
            - Geometric UI (zero emojis)
            - Detection history with thumbnails
            - Resume-capable model download
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
